<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        textarea {
            width: 100%;
            height: 100px;
            margin-top: 10px;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Resume Analyzer</h2>

    <input type="file" id="resume"><br><br>

    <textarea id="jobDesc" placeholder="Paste Job Description"></textarea>

    <button onclick="analyzeResume()">Analyze</button>

    <div id="result"></div>
</div>

<script>
async function analyzeResume() {
    const fileInput = document.getElementById("resume");
    const jobDesc = document.getElementById("jobDesc").value;

    if (!fileInput.files[0]) {
        alert("Upload resume first!");
        return;
    }

    let formData = new FormData();
    formData.append("resume", fileInput.files[0]);
    formData.append("job_description", jobDesc);

    document.getElementById("result").innerHTML = "Analyzing...";

    try {
        const response = await fetch("http://127.0.0.1:5000/analyze", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        document.getElementById("result").innerHTML = `
            <h3>Match Score: ${data.match_score}%</h3>
            <p><b>Resume Skills:</b> ${data.resume_skills.join(", ")}</p>
            <p><b>Job Skills:</b> ${data.job_skills.join(", ")}</p>
            <p><b>Missing Skills:</b> ${data.missing_skills.join(", ")}</p>
        `;
    } catch (error) {
        document.getElementById("result").innerHTML = "Error connecting to server!";
    }
}
</script>

</body>
</html>
